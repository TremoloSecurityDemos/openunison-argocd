  api_server_host: "k8sapi.192-168-2-133.nip.io"
  session_inactivity_timeout_seconds: 900
  k8s_url: https://192.168.2.130:6443
  force_redirect_to_tls: false
  createIngressCertificate: false
  ingress_type: traefik
  ingress_annotations: {}

cert_template:
  ou: "Kubernetes"
  o: "MyOrg"
  l: "My Cluster"
  st: "State of Cluster"
  c: "MyCountry"


image: harbor.qalab.tremolo.dev/lab/ou-k8s:1.0.50
myvd_config_path: "WEB-INF/myvd.conf"
k8s_cluster_name: sts
enable_impersonation: false

impersonation:
  use_jetstack: true
  explicit_certificate_trust: true

headlamp:
  enabled: false

dashboard:
  enabled: false

certs:
  use_k8s_cm: false

trusted_certs: []

monitoring:
  prometheus_service_account: system:serviceaccount:monitoring:prometheus-k8s

