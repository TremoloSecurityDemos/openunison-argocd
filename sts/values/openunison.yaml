network_policies:
  enabled: false
  ingress:
    enabled: true
    labels:
      app.kubernetes.io/name: ingress-nginx
  monitoring:
    enabled: true
    labels:
      app.kubernetes.io/name: monitoring
  apiserver:
    enabled: false
    labels:
      app.kubernetes.io/name: kube-system

services:
  enable_tokenrequest: false
  token_request_audience: api
  token_request_expiration_seconds: 600
  node_selectors: []
  liveness_probe:
  - /usr/local/openunison/bin/check_alive.sh
  - "https://127.0.0.1:8443/check_alive"
  - "issuer"
  - "https://127.0.0.1:8443/check_alive"
  - "alive"
  readiness_probe:
  - /usr/local/openunison/bin/check_alive.sh
  - "https://127.0.0.1:8443/check_alive"
  - "issuer"
  - "https://127.0.0.1:8443/check_alive"
  - "alive"
  
openunison:
  keys:
  - name: sts-aws
    import_into_ks: keypair
    tls_secret_name: aws-sts-certificate
    replace_if_exists: false
    create_data:
      ca_cert: true
      key_size: 2048
      server_name: aws-sts
  - name: sts-aws-cp
    import_into_ks: keypair
    tls_secret_name: aws-sts-cp-certificate
    replace_if_exists: false
    create_data:
      ca_cert: true
      key_size: 2048
      server_name: aws-sts
  - name: sts-claude
    import_into_ks: keypair
    tls_secret_name: claude-sts-certificate
    replace_if_exists: false
    create_data:
      ca_cert: true
      key_size: 2048
      server_name: claude-sts
  - name: external
    import_into_ks: certificate
    tls_secret_name: ou-tls-certificate
    replace_if_exists: false
    create_data:
      ca_cert: true
      key_size: 2048
      server_name: aws-sts
  enable_portal: false
  enable_pre_check: false
  replicas: 1
  non_secret_data:
    K8S_DB_SSO: oidc
    PROMETHEUS_SERVICE_ACCOUNT: system:serviceaccount:monitoring:prometheus-k8s
    SHOW_PORTAL_ORGS: "false"
  secrets: []
  enable_provisioning: false
  use_standard_jit_workflow: true
